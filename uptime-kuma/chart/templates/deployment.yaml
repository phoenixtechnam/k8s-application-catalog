apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "uptime-kuma.fullname" . }}
  labels:
    {{- include "uptime-kuma.labels" . | nindent 4 }}
    app.kubernetes.io/component: uptime-kuma
spec:
  replicas: {{ .Values.uptimeKuma.replicas }}
  selector:
    matchLabels:
      {{- include "uptime-kuma.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: uptime-kuma
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "uptime-kuma.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: uptime-kuma
    spec:
      containers:
        - name: uptime-kuma
          image: {{ .Values.uptimeKuma.image }}
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "uptime-kuma.fullname" . }}-secret
                optional: true
          volumeMounts:
            - name: kuma-data
              mountPath: /app/data
          resources:
            requests:
              cpu: {{ .Values.uptimeKuma.resources.requests.cpu }}
              memory: {{ .Values.uptimeKuma.resources.requests.memory }}
            limits:
              cpu: {{ .Values.uptimeKuma.resources.limits.cpu }}
              memory: {{ .Values.uptimeKuma.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: false
      volumes:
        - name: kuma-data
          persistentVolumeClaim:
            claimName: {{ include "uptime-kuma.fullname" . }}-data
