apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "uptime-kuma.fullname" . }}-uptime-kuma
  labels:
    {{- include "uptime-kuma.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "uptime-kuma.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: uptime-kuma
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 3001
          protocol: TCP
