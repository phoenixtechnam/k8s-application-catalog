apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secret
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  MARIADB_ROOT_PASSWORD: {{ .Values.auth.rootPassword | quote }}
  MARIADB_DATABASE: {{ .Values.auth.database | quote }}
  MARIADB_USER: {{ .Values.auth.username | quote }}
  MARIADB_PASSWORD: {{ .Values.auth.password | quote }}
