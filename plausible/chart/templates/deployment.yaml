apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "plausible.fullname" . }}
  labels:
    {{- include "plausible.labels" . | nindent 4 }}
    app.kubernetes.io/component: plausible
spec:
  replicas: {{ .Values.plausible.replicas }}
  selector:
    matchLabels:
      {{- include "plausible.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: plausible
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "plausible.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: plausible
    spec:
      containers:
        - name: plausible
          image: {{ .Values.plausible.image }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "plausible.fullname" . }}-secret
          env:
            - name: BASE_URL
              value: "https://{{ .Values.ingress.domain }}"
            - name: DATABASE_URL
              value: "postgres://{{ .Values.postgresql.user }}:$(POSTGRES_PASSWORD)@{{ include "plausible.fullname" . }}-postgresql:5432/{{ .Values.postgresql.database }}"
            - name: CLICKHOUSE_DATABASE_URL
              value: "http://{{ include "plausible.fullname" . }}-clickhouse:8123/plausible_events"
          resources:
            requests:
              cpu: {{ .Values.plausible.resources.requests.cpu }}
              memory: {{ .Values.plausible.resources.requests.memory }}
            limits:
              cpu: {{ .Values.plausible.resources.limits.cpu }}
              memory: {{ .Values.plausible.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: false
