apiVersion: v1
kind: Service
metadata:
  name: {{ include "plausible.fullname" . }}
  labels:
    {{- include "plausible.labels" . | nindent 4 }}
    app.kubernetes.io/component: plausible
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "plausible.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: plausible
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "plausible.fullname" . }}-postgresql
  labels:
    {{- include "plausible.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 5432
      targetPort: postgresql
      protocol: TCP
      name: postgresql
  selector:
    {{- include "plausible.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "plausible.fullname" . }}-clickhouse
  labels:
    {{- include "plausible.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 8123
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "plausible.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
