discourse:
  image: bitnami/discourse:3
  replicas: 1
  siteName: "My Discourse Forum"
  adminEmail: ""
  adminPassword: ""
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi

postgresql:
  image: postgres:16-alpine
  database: discourse
  user: discourse
  password: ""
  storageSize: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

redis:
  enabled: true
  image: redis:7-alpine
  maxMemory: "256mb"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

ingress:
  enabled: true
  domain: ""
  tls: true
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"

discourseData:
  storageSize: 20Gi

smtp:
  host: ""
  port: 587
  username: ""
  password: ""
