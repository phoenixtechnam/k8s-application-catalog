apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "discourse.fullname" . }}-discourse
  labels:
    {{- include "discourse.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "discourse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: discourse
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 3000
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "discourse.fullname" . }}-postgresql
  labels:
    {{- include "discourse.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "discourse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgresql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "discourse.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: discourse
      ports:
        - port: 5432
          protocol: TCP
{{- if .Values.redis.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "discourse.fullname" . }}-redis
  labels:
    {{- include "discourse.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "discourse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "discourse.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: discourse
      ports:
        - port: 6379
          protocol: TCP
{{- end }}
