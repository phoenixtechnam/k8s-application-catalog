apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "discourse.fullname" . }}
  labels:
    {{- include "discourse.labels" . | nindent 4 }}
    app.kubernetes.io/component: discourse
spec:
  replicas: {{ .Values.discourse.replicas }}
  selector:
    matchLabels:
      {{- include "discourse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: discourse
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "discourse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: discourse
    spec:
      containers:
        - name: discourse
          image: {{ .Values.discourse.image }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "discourse.fullname" . }}-secret
            - configMapRef:
                name: {{ include "discourse.fullname" . }}-config
                optional: true
          volumeMounts:
            - name: discourse-data
              mountPath: /bitnami/discourse
          resources:
            requests:
              cpu: {{ .Values.discourse.resources.requests.cpu }}
              memory: {{ .Values.discourse.resources.requests.memory }}
            limits:
              cpu: {{ .Values.discourse.resources.limits.cpu }}
              memory: {{ .Values.discourse.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /srv/status
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /srv/status
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: false
      volumes:
        - name: discourse-data
          persistentVolumeClaim:
            claimName: {{ include "discourse.fullname" . }}-discourse-data
