name: Validate Catalog

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check JSON formatting
        run: npm run format:check

      - name: Validate manifests and charts
        run: npm run validate

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm lint all charts
        run: |
          errors=0
          for chart in */chart; do
            entry=$(dirname "$chart")
            echo "=== helm lint $entry ==="
            if ! helm lint "$chart" --strict; then
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "❌ $errors chart(s) failed helm lint"
            exit 1
          fi
          echo "✅ All charts passed helm lint"
