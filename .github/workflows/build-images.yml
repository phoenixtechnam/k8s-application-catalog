name: Build & Push Catalog Images

on:
  push:
    branches: [main]
    paths:
      - 'nginx-php/Dockerfile'
      - 'nginx-php/nginx.conf'
      - 'nginx-php/supervisord.conf'
      - 'nginx-php/.dockerignore'
      - 'apache-php/Dockerfile'
      - 'apache-php/.dockerignore'
      - 'static-nginx/Dockerfile'
      - 'static-nginx/nginx.conf'
      - 'static-nginx/.dockerignore'
      - 'static-apache/Dockerfile'
      - 'static-apache/.dockerignore'
      - 'nodejs/Dockerfile'
      - 'nodejs/.dockerignore'
      - 'ruby-33/Dockerfile'
      - 'ruby-33/.dockerignore'
      - 'golang-122/Dockerfile'
      - 'golang-122/.dockerignore'
      - 'dotnet-8/Dockerfile'
      - 'dotnet-8/.dockerignore'
      - 'java-21/Dockerfile'
      - 'java-21/.dockerignore'
      - 'python-312/Dockerfile'
      - 'python-312/.dockerignore'
      - 'rust-stable/Dockerfile'
      - 'rust-stable/.dockerignore'
      - '.github/workflows/build-images.yml'
  pull_request:
    branches: [main]
    paths:
      - 'nginx-php/Dockerfile'
      - 'nginx-php/nginx.conf'
      - 'nginx-php/supervisord.conf'
      - 'nginx-php/.dockerignore'
      - 'apache-php/Dockerfile'
      - 'apache-php/.dockerignore'
      - 'static-nginx/Dockerfile'
      - 'static-nginx/nginx.conf'
      - 'static-nginx/.dockerignore'
      - 'static-apache/Dockerfile'
      - 'static-apache/.dockerignore'
      - 'nodejs/Dockerfile'
      - 'nodejs/.dockerignore'
      - 'ruby-33/Dockerfile'
      - 'ruby-33/.dockerignore'
      - 'golang-122/Dockerfile'
      - 'golang-122/.dockerignore'
      - 'dotnet-8/Dockerfile'
      - 'dotnet-8/.dockerignore'
      - 'java-21/Dockerfile'
      - 'java-21/.dockerignore'
      - 'python-312/Dockerfile'
      - 'python-312/.dockerignore'
      - 'rust-stable/Dockerfile'
      - 'rust-stable/.dockerignore'
      - '.github/workflows/build-images.yml'

# Cancel superseded runs for the same ref so a fast follow-up push
# doesn't waste runner minutes on the previous build.
concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect changed images
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # Each filter lists ONLY files that affect the image build —
          # not manifest.json/chart/icon (those are catalog metadata and
          # do not influence the docker build context). Workflow file is
          # included in every filter so a CI change rebuilds everything.
          filters: |
            nginx-php:
              - 'nginx-php/Dockerfile'
              - 'nginx-php/nginx.conf'
              - 'nginx-php/supervisord.conf'
              - 'nginx-php/.dockerignore'
              - '.github/workflows/build-images.yml'
            apache-php:
              - 'apache-php/Dockerfile'
              - 'apache-php/.dockerignore'
              - '.github/workflows/build-images.yml'
            static-nginx:
              - 'static-nginx/Dockerfile'
              - 'static-nginx/nginx.conf'
              - 'static-nginx/.dockerignore'
              - '.github/workflows/build-images.yml'
            static-apache:
              - 'static-apache/Dockerfile'
              - 'static-apache/.dockerignore'
              - '.github/workflows/build-images.yml'
            nodejs:
              - 'nodejs/Dockerfile'
              - 'nodejs/.dockerignore'
              - '.github/workflows/build-images.yml'
            ruby-33:
              - 'ruby-33/Dockerfile'
              - 'ruby-33/.dockerignore'
              - '.github/workflows/build-images.yml'
            golang-122:
              - 'golang-122/Dockerfile'
              - 'golang-122/.dockerignore'
              - '.github/workflows/build-images.yml'
            dotnet-8:
              - 'dotnet-8/Dockerfile'
              - 'dotnet-8/.dockerignore'
              - '.github/workflows/build-images.yml'
            java-21:
              - 'java-21/Dockerfile'
              - 'java-21/.dockerignore'
              - '.github/workflows/build-images.yml'
            python-312:
              - 'python-312/Dockerfile'
              - 'python-312/.dockerignore'
              - '.github/workflows/build-images.yml'
            rust-stable:
              - 'rust-stable/Dockerfile'
              - 'rust-stable/.dockerignore'
              - '.github/workflows/build-images.yml'

  build:
    name: Build ${{ matrix.image }}
    needs: detect
    if: needs.detect.outputs.images != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.detect.outputs.images) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Read the version tag from the chart's values.yaml (single source of
      # truth for the major-version-suffixed tag, e.g. "8.4", "1.27", "22").
      # If the chart is missing or has no image.tag, default to "latest" only.
      - name: Resolve image tag from chart values
        id: tag
        run: |
          values_file="${{ matrix.image }}/chart/values.yaml"
          if [ -f "$values_file" ]; then
            # Match `  tag: "X.Y"` under the `image:` block.
            chart_tag=$(awk '/^image:/{f=1; next} f && /^  tag:/{gsub(/[" ]/,""); sub(/^tag:/,""); print; exit}' "$values_file")
          else
            chart_tag=""
          fi
          echo "chart_tag=${chart_tag}" >> "$GITHUB_OUTPUT"
          echo "Resolved chart tag: '${chart_tag}'"

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build${{ github.event_name == 'push' && ' & push' || '' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image }}
          push: ${{ github.event_name == 'push' }}
          # Three tags on push:
          #   :<git-sha>      — immutable, traceable, never floats
          #   :<chart-tag>    — version-pinned, used by manifest/chart refs
          #   :latest         — moving, for opt-in latest pulls
          # PRs build only (no push) — sanity check.
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:${{ github.sha }}
            ${{ steps.tag.outputs.chart_tag != '' && format('ghcr.io/{0}/{1}:{2}', github.repository, matrix.image, steps.tag.outputs.chart_tag) || '' }}
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
