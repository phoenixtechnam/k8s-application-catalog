wordpress:
  image: wordpress:6.7-php8.4-apache
  replicas: 1
  phpMemoryLimit: "256M"
  uploadMaxSize: "64M"
  maxExecutionTime: 300
  siteTitle: "My WordPress Site"
  adminUser: "admin"
  adminPassword: ""
  adminEmail: ""
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

mariadb:
  image: mariadb:10.11
  rootPassword: ""
  database: wordpress
  user: wp_user
  password: ""
  storageSize: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

redis:
  enabled: true
  image: redis:7-alpine
  maxMemory: "128mb"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

ingress:
  enabled: true
  domain: ""
  tls: true
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "64m"

wpContent:
  storageSize: 10Gi

cron:
  enabled: true
  schedule: "*/15 * * * *"

smtp:
  host: ""
  port: 587
  username: ""
  password: ""
