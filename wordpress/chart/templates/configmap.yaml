apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "wordpress.fullname" . }}-config
  labels:
    {{- include "wordpress.labels" . | nindent 4 }}
data:
  php-custom.ini: |
    upload_max_filesize = {{ .Values.wordpress.uploadMaxSize }}
    post_max_size = {{ .Values.wordpress.uploadMaxSize }}
    memory_limit = {{ .Values.wordpress.phpMemoryLimit }}
    max_execution_time = {{ .Values.wordpress.maxExecutionTime }}
    max_input_vars = 5000

    ; OPcache settings
    opcache.enable = 1
    opcache.memory_consumption = 128
    opcache.max_accelerated_files = 10000
    opcache.revalidate_freq = 60

  {{- if .Values.redis.enabled }}
  WORDPRESS_CONFIG_EXTRA: |
    define('WP_REDIS_HOST', '{{ include "wordpress.fullname" . }}-redis');
    define('WP_REDIS_PORT', 6379);
    define('WP_CACHE', true);
    {{- if .Values.cron.enabled }}
    define('DISABLE_WP_CRON', true);
    {{- end }}
  {{- else if .Values.cron.enabled }}
  WORDPRESS_CONFIG_EXTRA: |
    define('DISABLE_WP_CRON', true);
  {{- end }}
