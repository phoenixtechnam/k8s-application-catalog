apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "moodle-bitnami.fullname" . }}-mariadb
  labels:
    {{- include "moodle-bitnami.labels" . | nindent 4 }}
    app.kubernetes.io/component: mariadb
spec:
  serviceName: {{ include "moodle-bitnami.fullname" . }}-mariadb
  replicas: 1
  selector:
    matchLabels:
      {{- include "moodle-bitnami.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mariadb
  template:
    metadata:
      labels:
        {{- include "moodle-bitnami.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mariadb
    spec:
      securityContext:
        fsGroup: 1001
      containers:
        - name: mariadb
          image: {{ .Values.mariadb.image }}
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "moodle-bitnami.fullname" . }}-secret
          env:
            - name: MARIADB_CHARACTER_SET
              value: "utf8mb4"
            - name: MARIADB_COLLATE
              value: "utf8mb4_unicode_ci"
            - name: MARIADB_EXTRA_FLAGS
              value: "--innodb-buffer-pool-size=256M --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci"
          resources:
            requests:
              cpu: {{ .Values.mariadb.resources.requests.cpu }}
              memory: {{ .Values.mariadb.resources.requests.memory }}
            limits:
              cpu: {{ .Values.mariadb.resources.limits.cpu }}
              memory: {{ .Values.mariadb.resources.limits.memory }}
          volumeMounts:
            - name: db-data
              mountPath: /bitnami/mariadb
          livenessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - mysqladmin ping -u root -p"${MARIADB_ROOT_PASSWORD}"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - mysqladmin ping -u root -p"${MARIADB_ROOT_PASSWORD}"
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsUser: 1001
            runAsNonRoot: true
  volumeClaimTemplates:
    - metadata:
        name: db-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.mariadb.storageSize }}
