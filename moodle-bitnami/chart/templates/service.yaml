apiVersion: v1
kind: Service
metadata:
  name: {{ include "moodle-bitnami.fullname" . }}
  labels:
    {{- include "moodle-bitnami.labels" . | nindent 4 }}
    app.kubernetes.io/component: moodle
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "moodle-bitnami.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: moodle
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "moodle-bitnami.fullname" . }}-mariadb
  labels:
    {{- include "moodle-bitnami.labels" . | nindent 4 }}
    app.kubernetes.io/component: mariadb
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 3306
      targetPort: mysql
      protocol: TCP
      name: mysql
  selector:
    {{- include "moodle-bitnami.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mariadb
{{- if .Values.redis.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "moodle-bitnami.fullname" . }}-redis
  labels:
    {{- include "moodle-bitnami.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    {{- include "moodle-bitnami.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
{{- end }}
