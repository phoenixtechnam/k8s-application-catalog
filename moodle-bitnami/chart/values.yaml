moodle:
  image: bitnami/moodle:4.5
  replicas: 1
  username: "admin"
  password: ""
  email: ""
  siteName: "Moodle"
  lang: "en"
  phpMaxUploadSize: "256M"
  phpMemoryLimit: "512M"
  smtpHost: ""
  smtpPort: 587
  smtpUser: ""
  smtpPassword: ""
  dataStorageSize: 20Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi

mariadb:
  image: bitnami/mariadb:10.11
  rootPassword: ""
  database: bitnami_moodle
  user: bn_moodle
  password: ""
  storageSize: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

redis:
  enabled: true
  image: redis:7-alpine
  maxMemory: "256mb"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

ingress:
  enabled: true
  domain: ""
  tls: true
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "256m"

cron:
  schedule: "*/1 * * * *"
