replicaCount: 1

image:
  repository: mysql
  tag: "8.4"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3306

resources:
  requests:
    cpu: 0.25
    memory: 256Mi
  limits:
    cpu: 0.25
    memory: 256Mi

persistence:
  enabled: true
  mountPath: "/var/lib/mysql"
  size: 5Gi

auth:
  rootPassword: ""
  database: ""
  username: ""
  password: ""
