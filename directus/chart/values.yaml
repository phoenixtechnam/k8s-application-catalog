# Directus values
domain: ""

directus:
  image:
    repository: directus/directus
    tag: "11"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8055
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

admin:
  email: ""
  password: ""

app:
  secret: ""

db:
  name: directus
  user: directus
  password: ""

postgresql:
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  port: 5432
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

persistence:
  uploads:
    size: 10Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  extensions:
    size: 1Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  dbData:
    size: 5Gi
    storageClass: ""
    accessMode: ReadWriteOnce

ingress:
  enabled: true
  className: nginx
  annotations: {}
  tls:
    enabled: true
    secretName: ""

networkPolicy:
  enabled: true
