apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "directus.fullname" . }}-app
  labels:
    {{- include "directus.labels" . | nindent 4 }}
    app.kubernetes.io/component: directus
spec:
  replicas: {{ .Values.directus.replicas }}
  selector:
    matchLabels:
      {{- include "directus.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: directus
  template:
    metadata:
      labels:
        {{- include "directus.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: directus
    spec:
      containers:
        - name: directus
          image: "{{ .Values.directus.image.repository }}:{{ .Values.directus.image.tag }}"
          imagePullPolicy: {{ .Values.directus.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.directus.port }}
              protocol: TCP
          env:
            - name: DB_CLIENT
              value: "pg"
            - name: DB_HOST
              value: "{{ include "directus.fullname" . }}-postgresql"
            - name: DB_PORT
              value: {{ .Values.postgresql.port | quote }}
            - name: DB_DATABASE
              value: {{ .Values.db.name | quote }}
            - name: DB_USER
              value: {{ .Values.db.user | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "directus.fullname" . }}-secret
                  key: db-password
            - name: SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "directus.fullname" . }}-secret
                  key: app-secret
            - name: ADMIN_EMAIL
              value: {{ .Values.admin.email | quote }}
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "directus.fullname" . }}-secret
                  key: admin-password
            - name: PUBLIC_URL
              value: "https://{{ .Values.domain }}"
          volumeMounts:
            - name: directus-uploads
              mountPath: /directus/uploads
            - name: directus-extensions
              mountPath: /directus/extensions
          livenessProbe:
            httpGet:
              path: /server/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /server/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: {{ .Values.directus.resources.requests.cpu }}
              memory: {{ .Values.directus.resources.requests.memory }}
            limits:
              cpu: {{ .Values.directus.resources.limits.cpu }}
              memory: {{ .Values.directus.resources.limits.memory }}
      volumes:
        - name: directus-uploads
          persistentVolumeClaim:
            claimName: {{ include "directus.fullname" . }}-uploads
        - name: directus-extensions
          persistentVolumeClaim:
            claimName: {{ include "directus.fullname" . }}-extensions
