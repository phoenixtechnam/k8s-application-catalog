apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "prestashop.fullname" . }}-ps-data
  labels:
    {{- include "prestashop.labels" . | nindent 4 }}
    app.kubernetes.io/component: prestashop
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.psData.storageSize }}
