apiVersion: v1
kind: Secret
metadata:
  name: {{ include "prestashop.fullname" . }}-secret
  labels:
    {{- include "prestashop.labels" . | nindent 4 }}
type: Opaque
stringData:
  MARIADB_ROOT_PASSWORD: {{ .Values.mariadb.rootPassword | quote }}
  MARIADB_DATABASE: {{ .Values.mariadb.database | quote }}
  MARIADB_USER: {{ .Values.mariadb.user | quote }}
  MARIADB_PASSWORD: {{ .Values.mariadb.password | quote }}
  DB_SERVER: {{ include "prestashop.fullname" . }}-mariadb
  DB_NAME: {{ .Values.mariadb.database | quote }}
  DB_USER: {{ .Values.mariadb.user | quote }}
  DB_PASSWD: {{ .Values.mariadb.password | quote }}
  ADMIN_MAIL: {{ .Values.prestashop.adminEmail | quote }}
  ADMIN_PASSWD: {{ .Values.prestashop.adminPassword | quote }}
  PS_SHOP_NAME: {{ .Values.prestashop.shopName | quote }}
  {{- if .Values.smtp.host }}
  SMTP_HOST: {{ .Values.smtp.host | quote }}
  SMTP_PORT: {{ .Values.smtp.port | quote }}
  SMTP_USERNAME: {{ .Values.smtp.username | quote }}
  SMTP_PASSWORD: {{ .Values.smtp.password | quote }}
  {{- end }}
