apiVersion: v1
kind: Service
metadata:
  name: {{ include "prestashop.fullname" . }}
  labels:
    {{- include "prestashop.labels" . | nindent 4 }}
    app.kubernetes.io/component: prestashop
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "prestashop.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: prestashop
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "prestashop.fullname" . }}-mariadb
  labels:
    {{- include "prestashop.labels" . | nindent 4 }}
    app.kubernetes.io/component: mariadb
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 3306
      targetPort: mysql
      protocol: TCP
      name: mysql
  selector:
    {{- include "prestashop.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mariadb
