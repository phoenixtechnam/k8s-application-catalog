prestashop:
  image: prestashop/prestashop:8
  replicas: 1
  adminEmail: ""
  adminPassword: ""
  shopName: "My Shop"
  language: "en"
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

mariadb:
  image: mariadb:10.11
  rootPassword: ""
  database: prestashop
  user: ps_user
  password: ""
  storageSize: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingress:
  enabled: true
  domain: ""
  tls: true
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "64m"

psData:
  storageSize: 20Gi

smtp:
  host: ""
  port: 587
  username: ""
  password: ""
