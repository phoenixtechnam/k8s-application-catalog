apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "paperless-ngx.fullname" . }}-app
  labels:
    {{- include "paperless-ngx.labels" . | nindent 4 }}
    app.kubernetes.io/component: paperless
spec:
  replicas: {{ .Values.paperless.replicas }}
  selector:
    matchLabels:
      {{- include "paperless-ngx.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: paperless
  template:
    metadata:
      labels:
        {{- include "paperless-ngx.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: paperless
    spec:
      containers:
        - name: paperless
          image: "{{ .Values.paperless.image.repository }}:{{ .Values.paperless.image.tag }}"
          imagePullPolicy: {{ .Values.paperless.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.paperless.port }}
              protocol: TCP
          env:
            - name: PAPERLESS_DBHOST
              value: "{{ include "paperless-ngx.fullname" . }}-postgresql"
            - name: PAPERLESS_DBPORT
              value: {{ .Values.postgresql.port | quote }}
            - name: PAPERLESS_DBNAME
              value: {{ .Values.db.name | quote }}
            - name: PAPERLESS_DBUSER
              value: {{ .Values.db.user | quote }}
            - name: PAPERLESS_DBPASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "paperless-ngx.fullname" . }}-secret
                  key: db-password
            - name: PAPERLESS_REDIS
              value: "redis://{{ include "paperless-ngx.fullname" . }}-redis:{{ .Values.redis.port }}"
            - name: PAPERLESS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "paperless-ngx.fullname" . }}-secret
                  key: secret-key
            - name: PAPERLESS_ADMIN_USER
              value: {{ .Values.admin.username | quote }}
            - name: PAPERLESS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "paperless-ngx.fullname" . }}-secret
                  key: admin-password
            - name: PAPERLESS_ADMIN_MAIL
              value: {{ .Values.admin.email | quote }}
            - name: PAPERLESS_OCR_LANGUAGE
              value: {{ .Values.ocr.language | quote }}
            - name: PAPERLESS_URL
              value: "https://{{ .Values.domain }}"
            {{- if .Values.smtp.host }}
            - name: PAPERLESS_EMAIL_HOST
              value: {{ .Values.smtp.host | quote }}
            - name: PAPERLESS_EMAIL_PORT
              value: {{ .Values.smtp.port | quote }}
            {{- if .Values.smtp.username }}
            - name: PAPERLESS_EMAIL_HOST_USER
              value: {{ .Values.smtp.username | quote }}
            - name: PAPERLESS_EMAIL_HOST_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "paperless-ngx.fullname" . }}-secret
                  key: smtp-password
            {{- end }}
            {{- end }}
          volumeMounts:
            - name: paperless-data
              mountPath: /usr/src/paperless/data
            - name: paperless-media
              mountPath: /usr/src/paperless/media
            - name: paperless-consume
              mountPath: /usr/src/paperless/consume
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          resources:
            requests:
              cpu: {{ .Values.paperless.resources.requests.cpu }}
              memory: {{ .Values.paperless.resources.requests.memory }}
            limits:
              cpu: {{ .Values.paperless.resources.limits.cpu }}
              memory: {{ .Values.paperless.resources.limits.memory }}
      volumes:
        - name: paperless-data
          persistentVolumeClaim:
            claimName: {{ include "paperless-ngx.fullname" . }}-data
        - name: paperless-media
          persistentVolumeClaim:
            claimName: {{ include "paperless-ngx.fullname" . }}-media
        - name: paperless-consume
          persistentVolumeClaim:
            claimName: {{ include "paperless-ngx.fullname" . }}-consume
