# Paperless-ngx values
domain: ""

paperless:
  image:
    repository: ghcr.io/paperless-ngx/paperless-ngx
    tag: "latest"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8000
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

admin:
  username: ""
  password: ""
  email: ""

app:
  secretKey: ""

ocr:
  language: eng

smtp:
  host: ""
  port: 587
  username: ""
  password: ""

db:
  name: paperless
  user: paperless
  password: ""

postgresql:
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  port: 5432
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

redis:
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  port: 6379
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

persistence:
  data:
    size: 5Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  media:
    size: 20Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  consume:
    size: 5Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  dbData:
    size: 5Gi
    storageClass: ""
    accessMode: ReadWriteOnce

ingress:
  enabled: true
  className: nginx
  annotations: {}
  tls:
    enabled: true
    secretName: ""

networkPolicy:
  enabled: true
