apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "strapi.fullname" . }}-app
  labels:
    {{- include "strapi.labels" . | nindent 4 }}
    app.kubernetes.io/component: strapi
spec:
  replicas: {{ .Values.strapi.replicas }}
  selector:
    matchLabels:
      {{- include "strapi.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: strapi
  template:
    metadata:
      labels:
        {{- include "strapi.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: strapi
    spec:
      containers:
        - name: strapi
          image: "{{ .Values.strapi.image.repository }}:{{ .Values.strapi.image.tag }}"
          imagePullPolicy: {{ .Values.strapi.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.strapi.port }}
              protocol: TCP
          env:
            - name: DATABASE_CLIENT
              value: "postgres"
            - name: DATABASE_HOST
              value: "{{ include "strapi.fullname" . }}-postgresql"
            - name: DATABASE_PORT
              value: {{ .Values.postgresql.port | quote }}
            - name: DATABASE_NAME
              value: {{ .Values.db.name | quote }}
            - name: DATABASE_USERNAME
              value: {{ .Values.db.user | quote }}
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "strapi.fullname" . }}-secret
                  key: db-password
            - name: ADMIN_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "strapi.fullname" . }}-secret
                  key: admin-jwt-secret
            - name: APP_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ include "strapi.fullname" . }}-secret
                  key: app-keys
            - name: API_TOKEN_SALT
              valueFrom:
                secretKeyRef:
                  name: {{ include "strapi.fullname" . }}-secret
                  key: api-token-salt
            - name: TRANSFER_TOKEN_SALT
              valueFrom:
                secretKeyRef:
                  name: {{ include "strapi.fullname" . }}-secret
                  key: transfer-token-salt
          volumeMounts:
            - name: strapi-data
              mountPath: /opt/app
          livenessProbe:
            httpGet:
              path: /_health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /_health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: {{ .Values.strapi.resources.requests.cpu }}
              memory: {{ .Values.strapi.resources.requests.memory }}
            limits:
              cpu: {{ .Values.strapi.resources.limits.cpu }}
              memory: {{ .Values.strapi.resources.limits.memory }}
      volumes:
        - name: strapi-data
          persistentVolumeClaim:
            claimName: {{ include "strapi.fullname" . }}-strapi-data
