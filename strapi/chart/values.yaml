# Strapi CMS values
domain: ""

strapi:
  image:
    repository: node
    tag: "20-alpine"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 1337
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

admin:
  jwtSecret: ""

app:
  keys: ""
  apiTokenSalt: ""
  transferTokenSalt: ""

db:
  name: strapi
  user: strapi
  password: ""

postgresql:
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  port: 5432
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

persistence:
  strapiData:
    size: 5Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  dbData:
    size: 5Gi
    storageClass: ""
    accessMode: ReadWriteOnce

ingress:
  enabled: true
  className: nginx
  annotations: {}
  tls:
    enabled: true
    secretName: ""

networkPolicy:
  enabled: true
