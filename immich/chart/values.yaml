immichServer:
  image: ghcr.io/immich-app/immich-server:release
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

immichMl:
  image: ghcr.io/immich-app/immich-machine-learning:release
  replicas: 1
  url: "http://immich-ml:3003"
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi

postgresql:
  image: tensorchord/pgvecto-rs:pg16-v0.2.1
  database: immich
  user: immich
  password: ""
  storageSize: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

redis:
  enabled: true
  image: redis:7-alpine
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

ingress:
  enabled: true
  domain: ""
  tls: true
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"

uploadData:
  storageSize: 100Gi

mlCache:
  storageSize: 5Gi
