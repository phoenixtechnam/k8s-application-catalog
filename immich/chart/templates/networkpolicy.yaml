apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "immich.fullname" . }}-server
  labels:
    {{- include "immich.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "immich.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: immich-server
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 2283
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "immich.fullname" . }}-ml
  labels:
    {{- include "immich.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "immich.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: immich-ml
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "immich.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: immich-server
      ports:
        - port: 3003
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "immich.fullname" . }}-postgresql
  labels:
    {{- include "immich.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "immich.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgresql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "immich.selectorLabels" . | nindent 14 }}
