{{- if .Values.redis.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "immich.fullname" . }}-redis
  labels:
    {{- include "immich.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "immich.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "immich.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: immich-server
      ports:
        - port: 6379
          protocol: TCP
{{- end }}
