apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "immich.fullname" . }}-server
  labels:
    {{- include "immich.labels" . | nindent 4 }}
    app.kubernetes.io/component: immich-server
spec:
  replicas: {{ .Values.immichServer.replicas }}
  selector:
    matchLabels:
      {{- include "immich.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: immich-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "immich.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: immich-server
    spec:
      containers:
        - name: immich-server
          image: {{ .Values.immichServer.image }}
          ports:
            - name: http
              containerPort: 2283
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "immich.fullname" . }}-secret
            - configMapRef:
                name: {{ include "immich.fullname" . }}-config
                optional: true
          volumeMounts:
            - name: upload-data
              mountPath: /usr/src/app/upload
          resources:
            requests:
              cpu: {{ .Values.immichServer.resources.requests.cpu }}
              memory: {{ .Values.immichServer.resources.requests.memory }}
            limits:
              cpu: {{ .Values.immichServer.resources.limits.cpu }}
              memory: {{ .Values.immichServer.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /api/server/ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/server/ping
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: upload-data
          persistentVolumeClaim:
            claimName: {{ include "immich.fullname" . }}-upload-data
