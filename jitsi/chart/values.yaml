jitsi:
  domain: ""
  authType: "internal"
  enableGuests: true
  defaultLanguage: "en"
  enableRecording: false
  maxParticipants: 100
  enableLobby: true

web:
  image: jitsi/web:stable-9823
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

prosody:
  image: jitsi/prosody:stable-9823
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

jicofo:
  image: jitsi/jicofo:stable-9823
  componentSecret: ""
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

jvb:
  image: jitsi/jvb:stable-9823
  publicIP: ""
  enableWsColibri: true
  hostPort: 10000
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi

coturn:
  enabled: false
  image: coturn/coturn:4.6
  authSecret: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

ingress:
  enabled: true
  domain: ""
  tls: true
