apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "jitsi.fullname" . }}-web
  labels:
    {{- include "jitsi.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "jitsi.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 80
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "jitsi.fullname" . }}-prosody
  labels:
    {{- include "jitsi.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "jitsi.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: prosody
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "jitsi.selectorLabels" . | nindent 14 }}
      ports:
        - port: 5222
          protocol: TCP
        - port: 5280
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "jitsi.fullname" . }}-jicofo
  labels:
    {{- include "jitsi.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "jitsi.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: jicofo
  policyTypes:
    - Ingress
  ingress: []
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "jitsi.fullname" . }}-jvb
  labels:
    {{- include "jitsi.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "jitsi.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: jvb
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 10000
          protocol: UDP
        - port: 8080
          protocol: TCP
{{- if .Values.coturn.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "jitsi.fullname" . }}-coturn
  labels:
    {{- include "jitsi.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "jitsi.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: coturn
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 3478
          protocol: UDP
        - port: 3478
          protocol: TCP
{{- end }}
