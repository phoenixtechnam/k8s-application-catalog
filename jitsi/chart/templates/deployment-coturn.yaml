{{- if .Values.coturn.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "jitsi.coturn.fullname" . }}-config
  labels:
    {{- include "jitsi.labels" . | nindent 4 }}
    app.kubernetes.io/component: coturn
data:
  turnserver.conf: |
    listening-port=3478
    fingerprint
    lt-cred-mech
    use-auth-secret
    static-auth-secret={{ .Values.coturn.authSecret }}
    realm={{ .Values.ingress.domain }}
    total-quota=100
    bps-capacity=0
    stale-nonce
    no-multicast-peers
    no-stdout-log
    syslog
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jitsi.coturn.fullname" . }}
  labels:
    {{- include "jitsi.labels" . | nindent 4 }}
    app.kubernetes.io/component: coturn
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "jitsi.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: coturn
  template:
    metadata:
      labels:
        {{- include "jitsi.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: coturn
    spec:
      containers:
        - name: coturn
          image: {{ .Values.coturn.image }}
          args:
            - -c
            - /etc/turnserver/turnserver.conf
          ports:
            - name: stun-udp
              containerPort: 3478
              protocol: UDP
              hostPort: 3478
            - name: stun-tcp
              containerPort: 3478
              protocol: TCP
              hostPort: 3478
          volumeMounts:
            - name: config
              mountPath: /etc/turnserver
              readOnly: true
          resources:
            requests:
              cpu: {{ .Values.coturn.resources.requests.cpu }}
              memory: {{ .Values.coturn.resources.requests.memory }}
            limits:
              cpu: {{ .Values.coturn.resources.limits.cpu }}
              memory: {{ .Values.coturn.resources.limits.memory }}
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "nc -zu localhost 3478"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: {{ include "jitsi.coturn.fullname" . }}-config
{{- end }}
