apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jitsi.jicofo.fullname" . }}
  labels:
    {{- include "jitsi.labels" . | nindent 4 }}
    app.kubernetes.io/component: jicofo
spec:
  replicas: {{ .Values.jicofo.replicas }}
  selector:
    matchLabels:
      {{- include "jitsi.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: jicofo
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "jitsi.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: jicofo
    spec:
      containers:
        - name: jicofo
          image: {{ .Values.jicofo.image }}
          envFrom:
            - configMapRef:
                name: {{ include "jitsi.fullname" . }}-env
            - secretRef:
                name: {{ include "jitsi.fullname" . }}-secret
          resources:
            requests:
              cpu: {{ .Values.jicofo.resources.requests.cpu }}
              memory: {{ .Values.jicofo.resources.requests.memory }}
            limits:
              cpu: {{ .Values.jicofo.resources.limits.cpu }}
              memory: {{ .Values.jicofo.resources.limits.memory }}
          livenessProbe:
            exec:
              command:
                - pgrep
                - -f
                - jicofo
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - pgrep
                - -f
                - jicofo
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
