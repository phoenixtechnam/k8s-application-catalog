apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jitsi.prosody.fullname" . }}
  labels:
    {{- include "jitsi.labels" . | nindent 4 }}
    app.kubernetes.io/component: prosody
spec:
  replicas: {{ .Values.prosody.replicas }}
  selector:
    matchLabels:
      {{- include "jitsi.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: prosody
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "jitsi.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: prosody
    spec:
      containers:
        - name: prosody
          image: {{ .Values.prosody.image }}
          ports:
            - name: xmpp-c2s
              containerPort: 5222
              protocol: TCP
            - name: xmpp-http
              containerPort: 5280
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "jitsi.fullname" . }}-env
            - secretRef:
                name: {{ include "jitsi.fullname" . }}-secret
          volumeMounts:
            - name: prosody-config
              mountPath: /config
          resources:
            requests:
              cpu: {{ .Values.prosody.resources.requests.cpu }}
              memory: {{ .Values.prosody.resources.requests.memory }}
            limits:
              cpu: {{ .Values.prosody.resources.limits.cpu }}
              memory: {{ .Values.prosody.resources.limits.memory }}
          livenessProbe:
            tcpSocket:
              port: xmpp-c2s
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: xmpp-c2s
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: prosody-config
          persistentVolumeClaim:
            claimName: {{ include "jitsi.fullname" . }}-prosody-config
