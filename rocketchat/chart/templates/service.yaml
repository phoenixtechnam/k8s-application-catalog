apiVersion: v1
kind: Service
metadata:
  name: {{ include "rocketchat.fullname" . }}
  labels:
    {{- include "rocketchat.labels" . | nindent 4 }}
    app.kubernetes.io/component: rocketchat
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "rocketchat.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: rocketchat
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rocketchat.fullname" . }}-mongodb
  labels:
    {{- include "rocketchat.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 27017
      targetPort: mongodb
      protocol: TCP
      name: mongodb
  selector:
    {{- include "rocketchat.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb
