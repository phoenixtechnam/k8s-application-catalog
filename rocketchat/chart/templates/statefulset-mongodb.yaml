apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "rocketchat.fullname" . }}-mongodb
  labels:
    {{- include "rocketchat.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb
spec:
  serviceName: {{ include "rocketchat.fullname" . }}-mongodb
  replicas: 1
  selector:
    matchLabels:
      {{- include "rocketchat.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mongodb
  template:
    metadata:
      labels:
        {{- include "rocketchat.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mongodb
    spec:
      containers:
        - name: mongodb
          image: {{ .Values.mongodb.image }}
          command:
            - mongod
            - --replSet
            - rs0
            - --oplogSize
            - {{ .Values.mongodb.oplogSizeMB | quote }}
          ports:
            - name: mongodb
              containerPort: 27017
              protocol: TCP
          resources:
            requests:
              cpu: {{ .Values.mongodb.resources.requests.cpu }}
              memory: {{ .Values.mongodb.resources.requests.memory }}
            limits:
              cpu: {{ .Values.mongodb.resources.limits.cpu }}
              memory: {{ .Values.mongodb.resources.limits.memory }}
          volumeMounts:
            - name: db-data
              mountPath: /data/db
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
      initContainers:
        - name: init-replset
          image: {{ .Values.mongodb.image }}
          command:
            - bash
            - -c
            - |
              sleep 5
              mongosh --host localhost:27017 --eval '
                rs.status().ok || rs.initiate({_id: "rs0", members: [{_id: 0, host: "localhost:27017"}]})
              ' || true
          restartPolicy: Always
  volumeClaimTemplates:
    - metadata:
        name: db-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.mongodb.storageSize }}
