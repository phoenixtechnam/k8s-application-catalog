apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rocketchat.fullname" . }}
  labels:
    {{- include "rocketchat.labels" . | nindent 4 }}
    app.kubernetes.io/component: rocketchat
spec:
  replicas: {{ .Values.rocketchat.replicas }}
  selector:
    matchLabels:
      {{- include "rocketchat.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: rocketchat
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "rocketchat.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: rocketchat
    spec:
      containers:
        - name: rocketchat
          image: {{ .Values.rocketchat.image }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "rocketchat.fullname" . }}-secret
            - configMapRef:
                name: {{ include "rocketchat.fullname" . }}-config
                optional: true
          volumeMounts:
            - name: rc-uploads
              mountPath: /app/uploads
          resources:
            requests:
              cpu: {{ .Values.rocketchat.resources.requests.cpu }}
              memory: {{ .Values.rocketchat.resources.requests.memory }}
            limits:
              cpu: {{ .Values.rocketchat.resources.limits.cpu }}
              memory: {{ .Values.rocketchat.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /api/info
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/info
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: rc-uploads
          persistentVolumeClaim:
            claimName: {{ include "rocketchat.fullname" . }}-rc-uploads
