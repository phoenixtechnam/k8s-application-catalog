replicaCount: 1

image:
  repository: ghcr.io/phoenixtechnam/k8s-application-catalog/static-apache
  tag: "2.4"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: nginx
  domain: ""
  tls: true

resources:
  requests:
    cpu: 0.10
    memory: 64Mi
  limits:
    cpu: 0.10
    memory: 64Mi

persistence:
  enabled: true
  mountPath: "/usr/local/apache2/htdocs"
  size: 5Gi

env: {}
