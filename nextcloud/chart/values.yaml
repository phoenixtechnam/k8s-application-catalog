nextcloud:
  image: nextcloud:30-apache
  replicas: 1
  adminUser: "admin"
  adminPassword: ""
  trustedDomains: ""
  defaultPhoneRegion: "US"
  dataStorageSize: 50Gi
  configStorageSize: 100Mi
  customAppsStorageSize: 1Gi
  smtpHost: ""
  smtpPort: 587
  smtpUser: ""
  smtpPassword: ""
  smtpFromAddress: ""
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 1Gi

mariadb:
  image: mariadb:10.11
  rootPassword: ""
  database: nextcloud
  user: nc_user
  password: ""
  storageSize: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

redis:
  enabled: true
  image: redis:7-alpine
  password: ""
  maxMemory: "256mb"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

collabora:
  enabled: false
  image: collabora/code:24.04
  domain: ""
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

ingress:
  enabled: true
  domain: ""
  tls: true
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "16G"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "3600"

cron:
  schedule: "*/5 * * * *"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

smtp:
  host: ""
  port: 587
  username: ""
  password: ""
