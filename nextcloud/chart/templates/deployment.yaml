apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nextcloud.fullname" . }}
  labels:
    {{- include "nextcloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: nextcloud
spec:
  replicas: {{ .Values.nextcloud.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "nextcloud.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: nextcloud
  template:
    metadata:
      labels:
        {{- include "nextcloud.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: nextcloud
    spec:
      containers:
        - name: nextcloud
          image: {{ .Values.nextcloud.image }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: NEXTCLOUD_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "nextcloud.fullname" . }}-secret
                  key: NEXTCLOUD_ADMIN_USER
            - name: NEXTCLOUD_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "nextcloud.fullname" . }}-secret
                  key: NEXTCLOUD_ADMIN_PASSWORD
            - name: NEXTCLOUD_TRUSTED_DOMAINS
              valueFrom:
                secretKeyRef:
                  name: {{ include "nextcloud.fullname" . }}-secret
                  key: NEXTCLOUD_TRUSTED_DOMAINS
            - name: MYSQL_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "nextcloud.fullname" . }}-secret
                  key: MYSQL_HOST
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ include "nextcloud.fullname" . }}-secret
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "nextcloud.fullname" . }}-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "nextcloud.fullname" . }}-secret
                  key: MYSQL_PASSWORD
            {{- if .Values.redis.enabled }}
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "nextcloud.fullname" . }}-secret
                  key: REDIS_HOST
            {{- if .Values.redis.password }}
            - name: REDIS_HOST_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "nextcloud.fullname" . }}-secret
                  key: REDIS_HOST_PASSWORD
            {{- end }}
            {{- end }}
            {{- if .Values.nextcloud.smtpHost }}
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "nextcloud.fullname" . }}-secret
                  key: SMTP_HOST
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "nextcloud.fullname" . }}-secret
                  key: SMTP_PORT
            - name: SMTP_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "nextcloud.fullname" . }}-secret
                  key: SMTP_NAME
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "nextcloud.fullname" . }}-secret
                  key: SMTP_PASSWORD
            - name: MAIL_FROM_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: {{ include "nextcloud.fullname" . }}-secret
                  key: MAIL_FROM_ADDRESS
            - name: SMTP_SECURE
              valueFrom:
                secretKeyRef:
                  name: {{ include "nextcloud.fullname" . }}-secret
                  key: SMTP_SECURE
            - name: SMTP_AUTHTYPE
              valueFrom:
                secretKeyRef:
                  name: {{ include "nextcloud.fullname" . }}-secret
                  key: SMTP_AUTHTYPE
            {{- end }}
            - name: NEXTCLOUD_DEFAULT_PHONE_REGION
              valueFrom:
                configMapKeyRef:
                  name: {{ include "nextcloud.fullname" . }}-config
                  key: NEXTCLOUD_DEFAULT_PHONE_REGION
            - name: OVERWRITEPROTOCOL
              value: "https"
            - name: OVERWRITECLIURL
              value: "https://{{ .Values.ingress.domain }}"
            - name: APACHE_BODY_LIMIT
              value: "0"
          volumeMounts:
            - name: nextcloud-data
              mountPath: /var/www/html/data
            - name: nextcloud-config
              mountPath: /var/www/html/config
            - name: nextcloud-custom-apps
              mountPath: /var/www/html/custom_apps
            - name: php-config
              mountPath: /usr/local/etc/php/conf.d/zzz-custom.ini
              subPath: php-custom.ini
            - name: apache-config
              mountPath: /etc/apache2/conf-enabled/security-headers.conf
              subPath: apache-custom.conf
          livenessProbe:
            httpGet:
              path: /status.php
              port: http
              httpHeaders:
                - name: Host
                  value: {{ .Values.ingress.domain | quote }}
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /status.php
              port: http
              httpHeaders:
                - name: Host
                  value: {{ .Values.ingress.domain | quote }}
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.nextcloud.resources | nindent 12 }}
      volumes:
        - name: nextcloud-data
          persistentVolumeClaim:
            claimName: {{ include "nextcloud.fullname" . }}-data
        - name: nextcloud-config
          persistentVolumeClaim:
            claimName: {{ include "nextcloud.fullname" . }}-config
        - name: nextcloud-custom-apps
          persistentVolumeClaim:
            claimName: {{ include "nextcloud.fullname" . }}-custom-apps
        - name: php-config
          configMap:
            name: {{ include "nextcloud.fullname" . }}-config
            items:
              - key: php-custom.ini
                path: php-custom.ini
        - name: apache-config
          configMap:
            name: {{ include "nextcloud.fullname" . }}-config
            items:
              - key: apache-custom.conf
                path: apache-custom.conf
