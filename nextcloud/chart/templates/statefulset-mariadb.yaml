apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "nextcloud.fullname" . }}-mariadb
  labels:
    {{- include "nextcloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: mariadb
spec:
  serviceName: {{ include "nextcloud.fullname" . }}-mariadb
  replicas: 1
  selector:
    matchLabels:
      {{- include "nextcloud.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mariadb
  template:
    metadata:
      labels:
        {{- include "nextcloud.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mariadb
    spec:
      containers:
        - name: mariadb
          image: {{ .Values.mariadb.image }}
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          args:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_general_ci
            - --innodb-buffer-pool-size=128M
            - --innodb-log-file-size=64M
            - --innodb-flush-method=O_DIRECT
            - --max-connections=200
            - --transaction-isolation=READ-COMMITTED
          env:
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "nextcloud.fullname" . }}-secret
                  key: MARIADB_ROOT_PASSWORD
            - name: MARIADB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ include "nextcloud.fullname" . }}-secret
                  key: MARIADB_DATABASE
            - name: MARIADB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "nextcloud.fullname" . }}-secret
                  key: MARIADB_USER
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "nextcloud.fullname" . }}-secret
                  key: MARIADB_PASSWORD
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/mysql
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "mysqladmin ping -u root -p${MARIADB_ROOT_PASSWORD}"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "mysqladmin ping -u root -p${MARIADB_ROOT_PASSWORD}"
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.mariadb.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: db-data
        labels:
          {{- include "nextcloud.labels" . | nindent 10 }}
          app.kubernetes.io/component: mariadb
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.mariadb.storageSize }}
