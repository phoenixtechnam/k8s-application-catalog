{{- if .Values.collabora.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nextcloud.fullname" . }}-collabora
  labels:
    {{- include "nextcloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: collabora
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "nextcloud.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: collabora
  template:
    metadata:
      labels:
        {{- include "nextcloud.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: collabora
    spec:
      containers:
        - name: collabora
          image: {{ .Values.collabora.image }}
          ports:
            - name: http
              containerPort: 9980
              protocol: TCP
          env:
            - name: domain
              value: {{ include "nextcloud.escapedDomain" . | quote }}
            - name: extra_params
              value: "--o:ssl.enable=false --o:ssl.termination=true --o:logging.level=warning --o:num_prespawn_children=1"
            - name: DONT_GEN_SSL_CERT
              value: "true"
            - name: server_name
              value: {{ .Values.collabora.domain | default (printf "office.%s" .Values.ingress.domain) | quote }}
          livenessProbe:
            httpGet:
              path: /cool/gettoken
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /cool/gettoken
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.collabora.resources | nindent 12 }}
{{- end }}
