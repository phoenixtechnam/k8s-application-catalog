apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "n8n.fullname" . }}
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
    app.kubernetes.io/component: n8n
spec:
  replicas: {{ .Values.n8n.replicas }}
  selector:
    matchLabels:
      {{- include "n8n.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: n8n
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "n8n.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: n8n
    spec:
      containers:
        - name: n8n
          image: {{ .Values.n8n.image }}
          ports:
            - name: http
              containerPort: 5678
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "n8n.fullname" . }}-secret
          env:
            - name: DB_TYPE
              value: "postgresdb"
            - name: DB_POSTGRESDB_HOST
              value: "{{ include "n8n.fullname" . }}-postgresql"
            - name: DB_POSTGRESDB_PORT
              value: "5432"
            - name: DB_POSTGRESDB_DATABASE
              value: {{ .Values.postgresql.database | quote }}
            - name: DB_POSTGRESDB_USER
              value: {{ .Values.postgresql.user | quote }}
            - name: WEBHOOK_URL
              value: {{ .Values.n8n.webhookUrl | quote }}
            - name: N8N_PORT
              value: "5678"
            - name: N8N_PROTOCOL
              value: "https"
            - name: N8N_HOST
              value: {{ .Values.ingress.domain | quote }}
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
          resources:
            requests:
              cpu: {{ .Values.n8n.resources.requests.cpu }}
              memory: {{ .Values.n8n.resources.requests.memory }}
            limits:
              cpu: {{ .Values.n8n.resources.limits.cpu }}
              memory: {{ .Values.n8n.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: false
      volumes:
        - name: n8n-data
          persistentVolumeClaim:
            claimName: {{ include "n8n.fullname" . }}-data
