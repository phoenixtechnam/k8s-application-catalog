apiVersion: v1
kind: Service
metadata:
  name: {{ include "gitea.fullname" . }}
  labels:
    {{- include "gitea.labels" . | nindent 4 }}
    app.kubernetes.io/component: gitea
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.gitea.sshEnabled }}
    - port: 22
      targetPort: ssh
      protocol: TCP
      name: ssh
    {{- end }}
  selector:
    {{- include "gitea.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gitea
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gitea.fullname" . }}-postgresql
  labels:
    {{- include "gitea.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 5432
      targetPort: postgresql
      protocol: TCP
      name: postgresql
  selector:
    {{- include "gitea.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
