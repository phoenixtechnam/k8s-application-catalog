replicaCount: 1

image:
  repository: ghcr.io/phoenixtechnam/k8s-application-catalog/rust-stable
  tag: "1.85"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: nginx
  domain: ""
  tls: true

resources:
  requests:
    cpu: 0.50
    memory: 512Mi
  limits:
    cpu: 0.50
    memory: 512Mi

persistence:
  enabled: true
  mountPath: "/app"
  size: 5Gi

env: {}
