apiVersion: v1
kind: Service
metadata:
  name: {{ include "wiki-js.fullname" . }}
  labels:
    {{- include "wiki-js.labels" . | nindent 4 }}
    app.kubernetes.io/component: wiki
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "wiki-js.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: wiki
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "wiki-js.fullname" . }}-postgresql
  labels:
    {{- include "wiki-js.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 5432
      targetPort: postgresql
      protocol: TCP
      name: postgresql
  selector:
    {{- include "wiki-js.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
