apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wiki-js.fullname" . }}
  labels:
    {{- include "wiki-js.labels" . | nindent 4 }}
    app.kubernetes.io/component: wiki
spec:
  replicas: {{ .Values.wiki.replicas }}
  selector:
    matchLabels:
      {{- include "wiki-js.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: wiki
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "wiki-js.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: wiki
    spec:
      containers:
        - name: wiki
          image: {{ .Values.wiki.image }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "wiki-js.fullname" . }}-secret
          env:
            - name: DB_TYPE
              value: "postgres"
            - name: DB_HOST
              value: {{ include "wiki-js.fullname" . }}-postgresql
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: {{ .Values.postgresql.database | quote }}
            - name: DB_USER
              value: {{ .Values.postgresql.user | quote }}
          resources:
            requests:
              cpu: {{ .Values.wiki.resources.requests.cpu }}
              memory: {{ .Values.wiki.resources.requests.memory }}
            limits:
              cpu: {{ .Values.wiki.resources.limits.cpu }}
              memory: {{ .Values.wiki.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: false
