apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "invoiceninja.fullname" . }}-app
  labels:
    {{- include "invoiceninja.labels" . | nindent 4 }}
    app.kubernetes.io/component: invoiceninja
spec:
  replicas: {{ .Values.invoiceninja.replicas }}
  selector:
    matchLabels:
      {{- include "invoiceninja.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: invoiceninja
  template:
    metadata:
      labels:
        {{- include "invoiceninja.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: invoiceninja
    spec:
      containers:
        - name: invoiceninja
          image: "{{ .Values.invoiceninja.image.repository }}:{{ .Values.invoiceninja.image.tag }}"
          imagePullPolicy: {{ .Values.invoiceninja.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.invoiceninja.port }}
              protocol: TCP
          env:
            - name: APP_URL
              value: {{ .Values.app.url | quote }}
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "invoiceninja.fullname" . }}-secret
                  key: app-key
            - name: DB_HOST
              value: "{{ include "invoiceninja.fullname" . }}-mariadb"
            - name: DB_PORT
              value: {{ .Values.mariadb.port | quote }}
            - name: DB_DATABASE
              value: {{ .Values.db.name | quote }}
            - name: DB_USERNAME
              value: {{ .Values.db.user | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "invoiceninja.fullname" . }}-secret
                  key: db-password
            - name: IN_USER_EMAIL
              value: {{ .Values.admin.email | quote }}
            - name: IN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "invoiceninja.fullname" . }}-secret
                  key: admin-password
            {{- if .Values.smtp.host }}
            - name: MAIL_HOST
              value: {{ .Values.smtp.host | quote }}
            - name: MAIL_PORT
              value: {{ .Values.smtp.port | quote }}
            {{- if .Values.smtp.username }}
            - name: MAIL_USERNAME
              value: {{ .Values.smtp.username | quote }}
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "invoiceninja.fullname" . }}-secret
                  key: smtp-password
            {{- end }}
            {{- end }}
          volumeMounts:
            - name: in-public
              mountPath: /var/www/app/public
            - name: in-storage
              mountPath: /var/www/app/storage
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          resources:
            requests:
              cpu: {{ .Values.invoiceninja.resources.requests.cpu }}
              memory: {{ .Values.invoiceninja.resources.requests.memory }}
            limits:
              cpu: {{ .Values.invoiceninja.resources.limits.cpu }}
              memory: {{ .Values.invoiceninja.resources.limits.memory }}
      volumes:
        - name: in-public
          persistentVolumeClaim:
            claimName: {{ include "invoiceninja.fullname" . }}-public
        - name: in-storage
          persistentVolumeClaim:
            claimName: {{ include "invoiceninja.fullname" . }}-storage
