apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "invoiceninja.fullname" . }}-public
  labels:
    {{- include "invoiceninja.labels" . | nindent 4 }}
    app.kubernetes.io/component: invoiceninja
spec:
  accessModes:
    - {{ .Values.persistence.public.accessMode }}
  {{- if .Values.persistence.public.storageClass }}
  storageClassName: {{ .Values.persistence.public.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.public.size }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "invoiceninja.fullname" . }}-storage
  labels:
    {{- include "invoiceninja.labels" . | nindent 4 }}
    app.kubernetes.io/component: invoiceninja
spec:
  accessModes:
    - {{ .Values.persistence.storage.accessMode }}
  {{- if .Values.persistence.storage.storageClass }}
  storageClassName: {{ .Values.persistence.storage.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.storage.size }}
