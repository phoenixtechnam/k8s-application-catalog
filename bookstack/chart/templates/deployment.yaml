apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bookstack.fullname" . }}
  labels:
    {{- include "bookstack.labels" . | nindent 4 }}
    app.kubernetes.io/component: bookstack
spec:
  replicas: {{ .Values.bookstack.replicas }}
  selector:
    matchLabels:
      {{- include "bookstack.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: bookstack
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "bookstack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: bookstack
    spec:
      containers:
        - name: bookstack
          image: {{ .Values.bookstack.image }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "bookstack.fullname" . }}-secret
          env:
            - name: APP_URL
              value: {{ .Values.bookstack.appUrl | quote }}
            - name: DB_HOST
              value: "{{ include "bookstack.fullname" . }}-mariadb"
            - name: DB_PORT
              value: "3306"
            - name: DB_DATABASE
              value: {{ .Values.mariadb.database | quote }}
            - name: DB_USERNAME
              value: {{ .Values.mariadb.user | quote }}
          volumeMounts:
            - name: bookstack-data
              mountPath: /config
          resources:
            requests:
              cpu: {{ .Values.bookstack.resources.requests.cpu }}
              memory: {{ .Values.bookstack.resources.requests.memory }}
            limits:
              cpu: {{ .Values.bookstack.resources.limits.cpu }}
              memory: {{ .Values.bookstack.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: false
      volumes:
        - name: bookstack-data
          persistentVolumeClaim:
            claimName: {{ include "bookstack.fullname" . }}-data
