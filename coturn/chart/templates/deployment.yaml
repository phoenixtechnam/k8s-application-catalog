apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "coturn.fullname" . }}
  labels:
    {{- include "coturn.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "coturn.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "coturn.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: coturn
          image: {{ .Values.coturn.image }}
          args:
            - -c
            - /etc/turnserver.conf
          ports:
            - name: turn-tcp
              containerPort: 3478
              hostPort: 3478
              protocol: TCP
            - name: turn-udp
              containerPort: 3478
              hostPort: 3478
              protocol: UDP
            {{- if .Values.coturn.tlsEnabled }}
            - name: turn-tls
              containerPort: 5349
              hostPort: 5349
              protocol: TCP
            {{- end }}
            {{- $minPort := int .Values.coturn.minPort }}
            {{- $maxPort := int .Values.coturn.maxPort }}
            {{- range untilStep $minPort (add1 $maxPort | int) 1 }}
            - name: relay-udp-{{ . }}
              containerPort: {{ . }}
              hostPort: {{ . }}
              protocol: UDP
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/turnserver.conf
              subPath: turnserver.conf
              readOnly: true
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          livenessProbe:
            tcpSocket:
              port: turn-tcp
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: turn-tcp
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: {{ include "coturn.fullname" . }}-config
