apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "coturn.fullname" . }}-config
  labels:
    {{- include "coturn.labels" . | nindent 4 }}
data:
  turnserver.conf: |
    listening-port=3478
    {{- if .Values.coturn.tlsEnabled }}
    tls-listening-port=5349
    {{- end }}
    realm={{ .Values.coturn.realm }}
    use-auth-secret
    static-auth-secret={{ .Values.coturn.authSecret }}
    external-ip={{ .Values.coturn.publicIP }}
    min-port={{ .Values.coturn.minPort }}
    max-port={{ .Values.coturn.maxPort }}
    max-bps={{ .Values.coturn.maxBandwidth }}
    fingerprint
    lt-cred-mech
    no-multicast-peers
    no-cli
    log-file=stdout
