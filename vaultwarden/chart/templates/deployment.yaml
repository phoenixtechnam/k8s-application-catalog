apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vaultwarden.fullname" . }}
  labels:
    {{- include "vaultwarden.labels" . | nindent 4 }}
    app.kubernetes.io/component: vaultwarden
spec:
  replicas: {{ .Values.vaultwarden.replicas }}
  selector:
    matchLabels:
      {{- include "vaultwarden.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: vaultwarden
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "vaultwarden.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: vaultwarden
    spec:
      containers:
        - name: vaultwarden
          image: {{ .Values.vaultwarden.image }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "vaultwarden.fullname" . }}-secret
          volumeMounts:
            - name: vw-data
              mountPath: /data
          resources:
            requests:
              cpu: {{ .Values.vaultwarden.resources.requests.cpu }}
              memory: {{ .Values.vaultwarden.resources.requests.memory }}
            limits:
              cpu: {{ .Values.vaultwarden.resources.limits.cpu }}
              memory: {{ .Values.vaultwarden.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /alive
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /alive
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: false
      volumes:
        - name: vw-data
          persistentVolumeClaim:
            claimName: {{ include "vaultwarden.fullname" . }}-vw-data
