apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "vaultwarden.fullname" . }}-vaultwarden
  labels:
    {{- include "vaultwarden.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "vaultwarden.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: vaultwarden
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 80
          protocol: TCP
