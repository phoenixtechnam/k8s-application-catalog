apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secret
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  MINIO_ROOT_USER: {{ .Values.auth.rootUser | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.auth.rootPassword | quote }}
