replicaCount: 1

image:
  repository: mongo
  tag: "7.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 27017

resources:
  requests:
    cpu: 0.25
    memory: 512Mi
  limits:
    cpu: 0.25
    memory: 512Mi

persistence:
  enabled: true
  mountPath: "/data/db"
  size: 10Gi

auth:
  rootPassword: ""
  database: ""
  username: ""
  password: ""
