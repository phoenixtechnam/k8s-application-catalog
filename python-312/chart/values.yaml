replicaCount: 1

image:
  repository: ghcr.io/phoenixtechnam/k8s-application-catalog/python-312
  tag: "3.12"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: nginx
  domain: ""
  tls: true

resources:
  requests:
    cpu: 0.25
    memory: 256Mi
  limits:
    cpu: 0.25
    memory: 256Mi

persistence:
  enabled: true
  mountPath: "/app"
  size: 5Gi

env: {}
