apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "matomo.fullname" . }}-matomo
  labels:
    {{- include "matomo.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "matomo.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: matomo
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 80
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "matomo.fullname" . }}-mariadb
  labels:
    {{- include "matomo.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "matomo.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mariadb
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "matomo.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: matomo
      ports:
        - port: 3306
          protocol: TCP
